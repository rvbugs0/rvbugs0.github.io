
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Brokerage calculator</title>

    <link href="https://fonts.googleapis.com/css?family=Inter:400,500" rel="stylesheet">
    <link rel="stylesheet" href="static/css/bundle.min.css" />
</head>
<body>

        

                    <center><h2 class="title" style="margin-top: 10px;">Risk Management for Trades </h2></center>
                    <div class="row">

                        <div class="brokerage-columns calc-wrapper" >
                            <h5 class="equity-head">Quantity Calculator - For Intraday Equity</h5>
                            <div class="row calc-inputs around">
                                <div class="three columns brokerage-calculator-input">
                                    <label>RISK PER TRADE</label>
                                    <input type="number" min="0" id="loss" oninput="runCalculation()" value="100" class="delivery del_bp">
                                </div>
                                <div class="three columns brokerage-calculator-input">
                                    <label>POSITION</label>
                                    <input type="number" min="0" id="price" oninput="runCalculation()"
                                        value="" class="delivery del_sp">
                                </div>
                                <div class="three columns brokerage-calculator-input">
                                    <label>STOP LOSS AT</label>
                                    <input type="number" min="0" id="stoploss" oninput="runCalculation()"
                                        class="delivery del_qty">
                                </div>
                                <div class="three columns brokerage-calculator-input">
                                    <label>Risk to Reward (1 : ?)</label>
                                    <input type="number" min="0"   id="reward" value="2" oninput="runCalculation()"
                                        class="delivery del_qty">
                                </div>
                            </div>
                            
                            
                            <div class="row net-profit equity-list" id="del_profit">
                                <label class="six columns">Difference</label>
                                <span class="six columns profit" id="difference">0</span>
                            </div>

                            <div class="row net-profit equity-list" id="del_profit">
                                <label class="six columns">Quantity</label>
                                <span class="six columns profit" id="quantity">0</span>
                            </div>
                            

                            <div class="row net-profit equity-list" >
                                <label class="six columns">Potential loss</label>
                                <span class="six columns profit neg" id="potLoss">0</span>
                            </div>

                            <div class="row net-profit equity-list" id="del_profit">
                                <label class="six columns">Target wrt R/R ratio</label>
                                <span class="six columns profit" id="target">0</span>
                            </div>


                            <div class="row net-profit equity-list" >
                                <label class="six columns">Net Profit wrt R/R ratio</label>
                                <span class="six columns profit">
                                    <input class="six columns profit pos" style="color: #00cc00; font-size: 18px;" placeholder="0"  id="potProfit" oninput="calRiskReward()">
                                </span>
                            </div>

                            <div class="row net-profit equity-list" id="del_profit">
                                <label class="six columns">Exit at profit</label>
                                <span class="six columns profit pos" style="color: #00cc00; font-size: 18px;" id="exitProfit">0</span>
                            </div>

                            

                        </div>




                    </div>

        

<script type="text/javascript">var OFFICES = "";</script>
<!-- <script src="static/js/bundle.min.js"></script> -->

<script type="text/javascript" src="static/js/brokerage.min.js"></script>


</body>

</html>
